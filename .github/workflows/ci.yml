# Audit-2026-05 P1 #7 — third-party actions are pinned to commit SHAs,
# not to floating tags (`@v5`, `@v6`, etc.). The `# vN` trailing comment
# is the human-readable version reference; Dependabot reads it and keeps
# both the SHA and the comment current via security/version-bump PRs.
# Why: a tag can be force-updated by the action publisher (or a compromised
# maintainer account); a SHA can't. For a release pipeline that pushes to
# GHCR, the tag-mutation vector is the primary supply-chain risk.
#
# When updating manually:
#   gh api repos/<owner>/<action>/commits/<tag> --jq '.sha'
# replaces the SHA on the line, then update the trailing comment to match.
#
# Internal `actions/*` references stay tag-pinned to the floating major
# (e.g. `@v5`) only when there is no version-comment after the SHA — never
# in this file.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: viator_ci
          POSTGRES_PASSWORD: viator_ci
          POSTGRES_DB: viator_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://viator_ci:viator_ci@localhost:5432/viator_ci
      INBOX_DIR: /tmp/viator-inbox
      ADMIN_USER: ci
      ADMIN_PASSWORD: ci
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0   # SonarCloud needs full git history for blame

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      # Note: black was dropped in audit-#21 closure. `ruff format` is
      # a drop-in replacement (https://docs.astral.sh/ruff/formatter/)
      # and a single formatter eliminates formatter-war flip-flops where
      # ruff-format and black disagreed on Alembic migration files. The
      # ReDoS advisory GHSA-3936-cmfr-pm3m (the original motivation for
      # #21) is moot once black is removed.

      - name: Mypy (strict type check)
        run: mypy app/

      - name: Bandit (security)
        run: bandit -r app/ -ll
        continue-on-error: false

      # Audit-2026-05 P0 #3. pip-audit is in requirements-dev.txt; this
      # step gates the build on Python-layer CVEs (Trivy in docker.yml
      # only catches OS-layer findings inside built images, not the
      # wheel deps we pin in requirements.txt).
      #
      # OSV is the upstream vulnerability service — covers PyPI advisories
      # with no API-key or rate-limit overhead. Failures exit non-zero.
      #
      # ── Accepted CVEs ────────────────────────────────────────────────
      # Mirror the .trivyignore convention: one CVE per line, written
      # justification, re-evaluate when the underlying dep changes.
      #
      # GHSA-wj6h-64fc-37mp — ecdsa 0.19.2 (no fix available)
      #   Transitive dep of python-jose[cryptography]==3.5.0. Vulnerability
      #   is timing side-channels in ECDSA sign/verify; upstream maintainers
      #   declined to fix (see https://github.com/tlsfuzzer/python-ecdsa/
      #   security/advisories/GHSA-wj6h-64fc-37mp). We use python-jose
      #   with the [cryptography] extra, which forces the cryptography
      #   library as the JWS backend — the ecdsa wheel is installed but
      #   not imported on our hot path. Re-evaluate if we ever switch JWT
      #   to ES256/ES384 (we currently use HS256, see app/security.py).
      #
      # GHSA-3936-cmfr-pm3m — black 24.10.0 (fix in 26.3.1, dev-only)
      #   Formatter ReDoS via crafted docstring. Black runs on our own
      #   source code in CI and dev only; we never format untrusted input.
      #   Bump deferred — 24.10 → 26.3 spans 18 months of style updates
      #   and will produce diff churn that doesn't belong in the audit
      #   PR. Tracked separately in audit-2026-05.md (P1 follow-up).
      #
      # GHSA-6w46-j5rx-g56g — pytest 8.3.4 (fix in 9.0.3, dev-only)
      #   Test isolation issue. Pytest runs only on our test files in CI;
      #   no production exposure. Bump deferred — 8 → 9 is a major bump
      #   with potential fixture-API breakage; out of scope for the
      #   security-floor audit PR. Tracked in audit-2026-05.md.
      - name: pip-audit (Python CVEs)
        run: |
          pip-audit --strict --vulnerability-service=osv \
            --ignore-vuln GHSA-wj6h-64fc-37mp \
            --ignore-vuln GHSA-3936-cmfr-pm3m \
            --ignore-vuln GHSA-6w46-j5rx-g56g
        continue-on-error: false

      # Audit-2026-05 P0 #4 (coverage floor — the L-effort test-writing
      # campaign is a separate workstream). The floor below is set just
      # under the v0.1.32.1 baseline (13.29% line) to lock in current
      # coverage as a regression gate. Ratchet upward whenever a PR
      # crosses the next round number — never lower it without an
      # explicit audit-tracker note.
      - name: Pytest with coverage (floor 12%)
        run: |
          mkdir -p "$INBOX_DIR"
          pytest --cov-fail-under=12

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    needs: python
    runs-on: ubuntu-latest
    # Stays dormant until you set repo variable SONARCLOUD_ENABLED=true.
    # Set it once SonarCloud is imported and SONAR_TOKEN secret exists.
    if: |
      vars.SONARCLOUD_ENABLED == 'true'
      && (github.event_name == 'push'
          || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: coverage-xml

      - uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8  # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pre-commit:
    name: Pre-commit (belt-and-braces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
