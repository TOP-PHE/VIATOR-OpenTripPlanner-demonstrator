name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: viator_ci
          POSTGRES_PASSWORD: viator_ci
          POSTGRES_DB: viator_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://viator_ci:viator_ci@localhost:5432/viator_ci
      INBOX_DIR: /tmp/viator-inbox
      ADMIN_USER: ci
      ADMIN_PASSWORD: ci
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # SonarCloud needs full git history for blame

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (strict type check)
        run: mypy app/

      - name: Bandit (security)
        run: bandit -r app/ -ll
        continue-on-error: false

      # Audit-2026-05 P0 #3. pip-audit is in requirements-dev.txt; this
      # step gates the build on Python-layer CVEs (Trivy in docker.yml
      # only catches OS-layer findings inside built images, not the
      # wheel deps we pin in requirements.txt).
      #
      # OSV is the upstream vulnerability service — covers PyPI advisories
      # with no API-key or rate-limit overhead. Failures exit non-zero;
      # add `--ignore-vuln GHSA-xxxx` here per accepted CVE (mirror the
      # justification in .trivyignore-style comments below).
      - name: pip-audit (Python CVEs)
        run: pip-audit --strict --vulnerability-service=osv
        # Currently no accepted CVEs. As the dep tree grows, add ignores:
        # run: pip-audit --strict --vulnerability-service=osv \
        #   --ignore-vuln GHSA-xxxx-yyyy-zzzz   # <reason>, accepted YYYY-MM-DD
        continue-on-error: false

      # Audit-2026-05 P0 #4 (coverage floor — the L-effort test-writing
      # campaign is a separate workstream). The floor below is set just
      # under the v0.1.32.1 baseline (13.29% line) to lock in current
      # coverage as a regression gate. Ratchet upward whenever a PR
      # crosses the next round number — never lower it without an
      # explicit audit-tracker note.
      - name: Pytest with coverage (floor 12%)
        run: |
          mkdir -p "$INBOX_DIR"
          pytest --cov-fail-under=12

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    needs: python
    runs-on: ubuntu-latest
    # Stays dormant until you set repo variable SONARCLOUD_ENABLED=true.
    # Set it once SonarCloud is imported and SONAR_TOKEN secret exists.
    if: |
      vars.SONARCLOUD_ENABLED == 'true'
      && (github.event_name == 'push'
          || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: coverage-xml

      - uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pre-commit:
    name: Pre-commit (belt-and-braces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
