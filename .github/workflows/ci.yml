name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: viator_ci
          POSTGRES_PASSWORD: viator_ci
          POSTGRES_DB: viator_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://viator_ci:viator_ci@localhost:5432/viator_ci
      INBOX_DIR: /tmp/viator-inbox
      ADMIN_USER: ci
      ADMIN_PASSWORD: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # SonarCloud needs full git history for blame

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Black (format check)
        run: black --check .

      - name: Mypy (strict type check)
        run: mypy app/

      - name: Bandit (security)
        run: bandit -r app/ -ll
        continue-on-error: false

      - name: Pytest with coverage
        run: |
          mkdir -p "$INBOX_DIR"
          pytest

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    needs: python
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  pre-commit:
    name: Pre-commit (belt-and-braces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure
