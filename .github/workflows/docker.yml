# Audit-2026-05 P1 #7 — third-party actions are pinned to commit SHAs,
# not floating tags. The trailing `# vN` comment is the human version
# reference; Dependabot keeps both current. See ci.yml header for the
# rationale + the `gh api` command for refreshing the SHA on each line.
name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  # Audit-2026-05 #26 — `pull_request:` always triggers (no path filter).
  # The `detect-changes` job below runs `dorny/paths-filter` to set an
  # output that the heavy jobs (`build-and-scan`, `hadolint`) gate on
  # via `if:`. The terminal `docker-gate` job always reports — that's
  # what branch-protection requires, instead of the matrix instances
  # which are skipped on docs-only PRs (skipped ≠ success in branch
  # protection's eyes, which is why required-but-skipped checks used
  # to stall PR merges indefinitely).
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  # On PRs we build & scan but don't push (no permission to push to a fork's GHCR anyway).
  PUSH: ${{ github.event_name != 'pull_request' }}

jobs:
  detect-changes:
    name: Detect docker-relevant changes
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706  # v4.0.2
        with:
          # Same path set previously used as the `pull_request: paths:`
          # trigger filter. The output bool drives the heavy jobs below.
          # `push` and tag events skip this job's gating entirely (they
          # always run the matrix) — see `if:` on each downstream job.
          filters: |
            docker:
              - 'docker/**'
              - 'app/**'
              - 'requirements.txt'
              - '.github/workflows/docker.yml'

  build-and-scan:
    name: Build, scan, push
    needs: detect-changes
    # Run on push/tag/manual unconditionally; on PRs only when relevant
    # files changed. Skipping on docs-only PRs saves ~5 min of CI work
    # and zero security loss (no docker change → no new attack surface
    # to scan).
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write           # attach SBOM to GitHub releases on tag push (anchore/sbom-action)
      packages: write           # push to GHCR
      security-events: write    # upload Trivy SARIF to the Security tab
      actions: read             # required by github/codeql-action/upload-sarif to fetch run metadata

    strategy:
      fail-fast: false          # don't cancel the otp build because web fails (or vice versa)
      matrix:
        image:
          - name: web
            context: .                            # repo root — Dockerfile copies app/ + requirements.txt
            dockerfile: docker/web/Dockerfile
            trivy_vuln_type: "os,library"         # we own all deps in this image
          - name: otp
            context: docker/otp                   # local — no app code needed
            dockerfile: docker/otp/Dockerfile
            # The OTP shaded jar bundles ~80 transitive Java deps we can't update
            # without forking OpenTripPlanner. Scan OS packages only — Java CVEs
            # are tracked upstream at https://github.com/opentripplanner/OpenTripPlanner/issues
            trivy_vuln_type: "os"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/viator-${{ matrix.image.name }}
          # VIATOR uses a 4-part version scheme (vX.Y.Z.W) which strict
          # SemVer rejects — `type=semver,pattern=...` extractors silently
          # discard the tag and emit a "not a valid semver" warning per
          # extractor per image (4 warnings per tag push). We use
          # `type=match` instead to extract a bare-3-part-semver prefix
          # for Docker consumers who want a moving `:0.1.35` pointer in
          # addition to the canonical `:v0.1.35.04` tag from
          # `type=ref,event=tag`. Major.minor matcher kept similarly.
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=match,pattern=v(\d+\.\d+\.\d+)\.\d+,group=1
            type=match,pattern=v(\d+\.\d+)\.\d+\.\d+,group=1
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=VIATOR ${{ matrix.image.name }}
            org.opencontainers.image.vendor=TrackOnPath
            org.opencontainers.image.licenses=Apache-2.0

      # Compute the version label baked into the web image. `metadata-action`
      # publishes `outputs.version` as the canonical single tag for this build:
      #   - tag push (e.g. `v0.1.8`)  → `0.1.8`           (semver pattern wins)
      #   - main push                 → `main`
      #   - PR build                  → `pr-NN`
      # We reattach the leading `v` for tag pushes so the badge matches the
      # human-facing release name (`v0.1.8`, not the bare semver). Falls back
      # to the raw value for non-tag refs.
      - name: Compute VIATOR_VERSION label
        id: version_label
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Build and load locally so Trivy can scan before pushing.
      - name: Build (load locally for scan)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          load: true
          tags: viator-${{ matrix.image.name }}:scan
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to:   type=gha,scope=${{ matrix.image.name }},mode=max
          # Stamp the web image with the release version so the UI badge +
          # /healthz/version report what's actually running. The OTP image
          # ignores this build-arg (no ARG declared in its Dockerfile —
          # docker just discards unknown args, no warning).
          build-args: |
            VIATOR_VERSION=${{ steps.version_label.outputs.value }}

      # Skip-list: the docker CLI binary + its plugins (compose, buildx) we copy
      # in from `docker:29-cli` (web Dockerfile stage 1). Trivy's gobinary scanner
      # finds CVEs in the bundled Go modules inside these statically-linked exes,
      # but we have no way to patch them — they're upstream's binary. The CVEs
      # we ARE aware of (CVE-2026-34040, -35469, -39883, -32280, -32281, -32283)
      # are listed in .trivyignore with per-CVE justifications; this skip-files
      # is belt-and-suspenders so a NEW CVE published mid-week doesn't block a
      # release on a finding we're already accepting the risk of by using the
      # docker CLI as a subprocess against a local Unix socket only.
      #
      # Re-evaluate when we bump the docker:29-cli base or switch to apt-installed
      # docker.io (rejected before for size/CVE reasons; see web Dockerfile).
      #
      # Path syntax is relative to image root, no leading slash. Comma-separated.
      # Empty for the OTP image (those paths don't exist in OTP, no harm done,
      # but we keep it explicit per-image so future changes are obvious).

      # ────────────────────────────── v0.1.25 NOTE ──────────────────────────
      # Pre-v0.1.25 we had two trivy-action calls — diagnostic (table, non-
      # fatal) and gating (sarif, fatal-on-vulns). The gating step exited 1
      # on v0.1.24 builds because trivy-action@v0.36.0 has a subtle bug:
      # the `severity: CRITICAL,HIGH` filter is applied to the table
      # reporter but NOT to the exit-code check when `format: sarif`. So
      # the table showed "0 vulnerabilities" while the SARIF contained 15
      # MEDIUM/LOW findings (curl/libcurl/sed routine patches), and exit-1
      # fired regardless of severity.
      #
      # v0.1.25 unifies the two passes: ONE table-format step that both
      # prints findings and gates the build (severity respected), plus a
      # separate SARIF-format step (severity filter ignored, all severities
      # emitted) that purely feeds the GitHub Security tab and the
      # downloadable artifact. Neither blocks the build.
      #
      # If the gating step fails, look at the table output above — those
      # ARE the CVEs that need attention. The SARIF artifact below shows
      # everything Trivy found regardless of severity, useful for triage.

      # Gating pass — table format honors `severity: CRITICAL,HIGH` for
      # exit-code, and the table doubles as the diagnostic readout. Do NOT
      # pass `output:` here — it would redirect the table to a file and
      # silence the log, which defeats the diagnostic purpose.
      - name: Trivy — vulnerability scan (table, gating)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: viator-${{ matrix.image.name }}:scan
          severity: CRITICAL,HIGH
          exit-code: 1                                       # fail on any HIGH/CRITICAL
          ignore-unfixed: true                               # suppress unactionable findings
          vuln-type: ${{ matrix.image.trivy_vuln_type }}      # web: os,library | otp: os only
          trivyignores: ".trivyignore"
          skip-files: "usr/local/bin/docker,usr/local/libexec/docker/cli-plugins/docker-buildx,usr/local/libexec/docker/cli-plugins/docker-compose"
          format: table

      # SARIF pass — non-fatal, full severity range. Feeds the GitHub
      # Security tab + downloadable artifact. We deliberately leave
      # `severity` empty so the SARIF reflects everything Trivy found,
      # not just HIGH/CRITICAL — useful for triage even when nothing
      # blocks the gate. exit-code:0 means a fresh batch of MEDIUMs
      # (the v0.1.24 footgun) can never block a release again.
      - name: Trivy — SARIF for Security tab (non-fatal)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: viator-${{ matrix.image.name }}:scan
          exit-code: 0                                       # never fail the build here
          ignore-unfixed: true
          vuln-type: ${{ matrix.image.trivy_vuln_type }}
          trivyignores: ".trivyignore"
          skip-files: "usr/local/bin/docker,usr/local/libexec/docker/cli-plugins/docker-buildx,usr/local/libexec/docker/cli-plugins/docker-compose"
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif

      # Upload to the Security tab — but don't fail CI if Code Scanning isn't
      # enabled on the repo. The findings are still visible in the diagnostic
      # step's table output above, and the SARIF artifact is uploaded below.
      # To enable Code Scanning: Settings → Code security and analysis →
      # Code scanning → Set up → Default. Free for public repos.
      #
      # Restricted to push events on main: PR runs from forks can't write to
      # security-events anyway, and skipping the upload there avoids the
      # "Resource not accessible by integration" warning noise.
      - name: Upload Trivy SARIF to GitHub Security tab
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      # Always keep the SARIF as a downloadable artifact, even when the upload
      # to Code Scanning is skipped. Lets you grep findings offline.
      - name: Upload Trivy SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: trivy-${{ matrix.image.name }}-sarif
          path: trivy-${{ matrix.image.name }}.sarif
          retention-days: 14

      # Audit-2026-05 P2 #16 — Software Bill of Materials.
      # Produces a CycloneDX-format SBOM per image listing every OS package
      # (apt for web, eclipse-temurin base for otp) and every Python wheel
      # (web only). Uploaded as workflow artifact + attached to GitHub
      # releases when this workflow runs on a tag push (event_name=push,
      # ref starts with refs/tags/v).
      #
      # Why CycloneDX (not SPDX): broader downstream tooling support
      # (Dependency-Track, GitHub's dependency review, Sonatype IQ, etc.).
      # Anchore's sbom-action wraps Syft under the hood and emits both
      # formats; we pick CycloneDX for the artifact's primary form.
      #
      # Run AFTER the Trivy steps so Trivy gating still drives the
      # success/failure of the matrix build — SBOM generation is purely
      # additive metadata, not a gate.
      - name: Generate CycloneDX SBOM
        if: always()
        # Don't fail the build on SBOM generation errors. The image is
        # already Trivy-gated; an SBOM glitch shouldn't block a release.
        continue-on-error: true
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0
        with:
          image: viator-${{ matrix.image.name }}:scan
          format: cyclonedx-json
          artifact-name: sbom-${{ matrix.image.name }}.cyclonedx.json
          output-file: sbom-${{ matrix.image.name }}.cyclonedx.json
          # Attach SBOM to GitHub releases automatically when the workflow
          # runs on a release-tag push. For other events (PR, branch push,
          # manual), the SBOM lives in the workflow artifact only.
          upload-release-assets: ${{ startsWith(github.ref, 'refs/tags/v') }}

      # Only after Trivy passes do we push (pushed image is bit-identical thanks to BuildKit).
      # Same build-args as the scan step — must match or BuildKit re-runs the
      # build instead of reusing the cached layers.
      - name: Build and push (multi-tag)
        if: env.PUSH == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to:   type=gha,scope=${{ matrix.image.name }},mode=max
          build-args: |
            VIATOR_VERSION=${{ steps.version_label.outputs.value }}

  hadolint:
    name: Hadolint (Dockerfile lint)
    needs: detect-changes
    if: |
      github.event_name != 'pull_request' ||
      needs.detect-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Lint web Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: docker/web/Dockerfile
          ignore: DL3008,DL3013    # apt pin / pip pin — acceptable for our skeletons
      - name: Lint otp Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: docker/otp/Dockerfile
          ignore: DL3008,DL3013

  # ───────────────────────────── docker-gate ─────────────────────────────
  # Audit-2026-05 #26 — pipeline gate that ALWAYS reports a status.
  #
  # Why: branch protection requires named status checks; a check that's
  # `skipped` (because of `if:` evaluation) does NOT satisfy "required to
  # pass". Pre-this-refactor, requiring `Build, scan, push (web)` /
  # `(otp)` / `Hadolint (Dockerfile lint)` stalled docs-only PRs forever
  # because the path-filter on `pull_request:` skipped the workflow
  # entirely.
  #
  # Now `pull_request:` always triggers; `detect-changes` decides if
  # the matrix is needed; `docker-gate` (this job) consumes the upstream
  # results and reports success when:
  #   - all upstream jobs succeeded, OR
  #   - heavy jobs were correctly skipped (no docker change in PR)
  # Failure of any upstream job fails the gate.
  #
  # Branch-protection should require `Docker pipeline gate` instead of
  # the matrix instances. See PR description for the migration steps.
  docker-gate:
    name: Docker pipeline gate
    needs: [detect-changes, build-and-scan, hadolint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify upstream results
        env:
          DETECT: ${{ needs.detect-changes.result }}
          BUILD: ${{ needs.build-and-scan.result }}
          HADOLINT: ${{ needs.hadolint.result }}
        run: |
          set -eu
          fail=0
          # detect-changes is a hard prerequisite — its failure means we
          # don't actually know whether the PR touched docker, so we
          # can't safely greenlight.
          if [ "$DETECT" != "success" ]; then
            echo "::error::detect-changes ended in: $DETECT"
            fail=1
          fi
          # build-and-scan and hadolint may legitimately be `skipped` on
          # docs-only PRs (no docker change, detect-changes.outputs.docker
          # was 'false'). Treat skipped as pass; treat failure / cancelled
          # / anything-else as block.
          for var in BUILD HADOLINT; do
            eval "val=\$$var"
            case "$val" in
              success|skipped) ;;
              *)
                echo "::error::${var} ended in: $val"
                fail=1
                ;;
            esac
          done
          if [ "$fail" -ne 0 ]; then
            exit 1
          fi
          echo "✅ docker pipeline gate passed (detect=$DETECT, build=$BUILD, hadolint=$HADOLINT)"
