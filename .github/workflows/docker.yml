name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "docker/**"
      - "app/**"
      - "requirements.txt"
      - ".github/workflows/docker.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  # On PRs we build & scan but don't push (no permission to push to a fork's GHCR anyway).
  PUSH: ${{ github.event_name != 'pull_request' }}

jobs:
  build-and-scan:
    name: Build, scan, push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write           # push to GHCR
      security-events: write    # upload Trivy SARIF to the Security tab
      actions: read             # required by github/codeql-action/upload-sarif to fetch run metadata

    strategy:
      fail-fast: false          # don't cancel the otp build because web fails (or vice versa)
      matrix:
        image:
          - name: web
            context: .                            # repo root — Dockerfile copies app/ + requirements.txt
            dockerfile: docker/web/Dockerfile
            trivy_vuln_type: "os,library"         # we own all deps in this image
          - name: otp
            context: docker/otp                   # local — no app code needed
            dockerfile: docker/otp/Dockerfile
            # The OTP shaded jar bundles ~80 transitive Java deps we can't update
            # without forking OpenTripPlanner. Scan OS packages only — Java CVEs
            # are tracked upstream at https://github.com/opentripplanner/OpenTripPlanner/issues
            trivy_vuln_type: "os"

    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: env.PUSH == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/viator-${{ matrix.image.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=VIATOR ${{ matrix.image.name }}
            org.opencontainers.image.vendor=TrackOnPath
            org.opencontainers.image.licenses=Apache-2.0

      # Compute the version label baked into the web image. `metadata-action`
      # publishes `outputs.version` as the canonical single tag for this build:
      #   - tag push (e.g. `v0.1.8`)  → `0.1.8`           (semver pattern wins)
      #   - main push                 → `main`
      #   - PR build                  → `pr-NN`
      # We reattach the leading `v` for tag pushes so the badge matches the
      # human-facing release name (`v0.1.8`, not the bare semver). Falls back
      # to the raw value for non-tag refs.
      - name: Compute VIATOR_VERSION label
        id: version_label
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ steps.meta.outputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      # Build and load locally so Trivy can scan before pushing.
      - name: Build (load locally for scan)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          load: true
          tags: viator-${{ matrix.image.name }}:scan
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to:   type=gha,scope=${{ matrix.image.name }},mode=max
          # Stamp the web image with the release version so the UI badge +
          # /healthz/version report what's actually running. The OTP image
          # ignores this build-arg (no ARG declared in its Dockerfile —
          # docker just discards unknown args, no warning).
          build-args: |
            VIATOR_VERSION=${{ steps.version_label.outputs.value }}

      # Skip-list: the docker CLI binary + its plugins (compose, buildx) we copy
      # in from `docker:29-cli` (web Dockerfile stage 1). Trivy's gobinary scanner
      # finds CVEs in the bundled Go modules inside these statically-linked exes,
      # but we have no way to patch them — they're upstream's binary. The CVEs
      # we ARE aware of (CVE-2026-34040, -35469, -39883, -32280, -32281, -32283)
      # are listed in .trivyignore with per-CVE justifications; this skip-files
      # is belt-and-suspenders so a NEW CVE published mid-week doesn't block a
      # release on a finding we're already accepting the risk of by using the
      # docker CLI as a subprocess against a local Unix socket only.
      #
      # Re-evaluate when we bump the docker:29-cli base or switch to apt-installed
      # docker.io (rejected before for size/CVE reasons; see web Dockerfile).
      #
      # Path syntax is relative to image root, no leading slash. Comma-separated.
      # Empty for the OTP image (those paths don't exist in OTP, no harm done,
      # but we keep it explicit per-image so future changes are obvious).

      # ────────────────────────────── v0.1.25 NOTE ──────────────────────────
      # Pre-v0.1.25 we had two trivy-action calls — diagnostic (table, non-
      # fatal) and gating (sarif, fatal-on-vulns). The gating step exited 1
      # on v0.1.24 builds because trivy-action@v0.36.0 has a subtle bug:
      # the `severity: CRITICAL,HIGH` filter is applied to the table
      # reporter but NOT to the exit-code check when `format: sarif`. So
      # the table showed "0 vulnerabilities" while the SARIF contained 15
      # MEDIUM/LOW findings (curl/libcurl/sed routine patches), and exit-1
      # fired regardless of severity.
      #
      # v0.1.25 unifies the two passes: ONE table-format step that both
      # prints findings and gates the build (severity respected), plus a
      # separate SARIF-format step (severity filter ignored, all severities
      # emitted) that purely feeds the GitHub Security tab and the
      # downloadable artifact. Neither blocks the build.
      #
      # If the gating step fails, look at the table output above — those
      # ARE the CVEs that need attention. The SARIF artifact below shows
      # everything Trivy found regardless of severity, useful for triage.

      # Gating pass — table format honors `severity: CRITICAL,HIGH` for
      # exit-code, and the table doubles as the diagnostic readout. Do NOT
      # pass `output:` here — it would redirect the table to a file and
      # silence the log, which defeats the diagnostic purpose.
      - name: Trivy — vulnerability scan (table, gating)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: viator-${{ matrix.image.name }}:scan
          severity: CRITICAL,HIGH
          exit-code: 1                                       # fail on any HIGH/CRITICAL
          ignore-unfixed: true                               # suppress unactionable findings
          vuln-type: ${{ matrix.image.trivy_vuln_type }}      # web: os,library | otp: os only
          trivyignores: ".trivyignore"
          skip-files: "usr/local/bin/docker,usr/local/libexec/docker/cli-plugins/docker-buildx,usr/local/libexec/docker/cli-plugins/docker-compose"
          format: table

      # SARIF pass — non-fatal, full severity range. Feeds the GitHub
      # Security tab + downloadable artifact. We deliberately leave
      # `severity` empty so the SARIF reflects everything Trivy found,
      # not just HIGH/CRITICAL — useful for triage even when nothing
      # blocks the gate. exit-code:0 means a fresh batch of MEDIUMs
      # (the v0.1.24 footgun) can never block a release again.
      - name: Trivy — SARIF for Security tab (non-fatal)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: viator-${{ matrix.image.name }}:scan
          exit-code: 0                                       # never fail the build here
          ignore-unfixed: true
          vuln-type: ${{ matrix.image.trivy_vuln_type }}
          trivyignores: ".trivyignore"
          skip-files: "usr/local/bin/docker,usr/local/libexec/docker/cli-plugins/docker-buildx,usr/local/libexec/docker/cli-plugins/docker-compose"
          format: sarif
          output: trivy-${{ matrix.image.name }}.sarif

      # Upload to the Security tab — but don't fail CI if Code Scanning isn't
      # enabled on the repo. The findings are still visible in the diagnostic
      # step's table output above, and the SARIF artifact is uploaded below.
      # To enable Code Scanning: Settings → Code security and analysis →
      # Code scanning → Set up → Default. Free for public repos.
      #
      # Restricted to push events on main: PR runs from forks can't write to
      # security-events anyway, and skipping the upload there avoids the
      # "Resource not accessible by integration" warning noise.
      - name: Upload Trivy SARIF to GitHub Security tab
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      # Always keep the SARIF as a downloadable artifact, even when the upload
      # to Code Scanning is skipped. Lets you grep findings offline.
      - name: Upload Trivy SARIF as workflow artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: trivy-${{ matrix.image.name }}-sarif
          path: trivy-${{ matrix.image.name }}.sarif
          retention-days: 14

      # Only after Trivy passes do we push (pushed image is bit-identical thanks to BuildKit).
      # Same build-args as the scan step — must match or BuildKit re-runs the
      # build instead of reusing the cached layers.
      - name: Build and push (multi-tag)
        if: env.PUSH == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to:   type=gha,scope=${{ matrix.image.name }},mode=max
          build-args: |
            VIATOR_VERSION=${{ steps.version_label.outputs.value }}

  hadolint:
    name: Hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Lint web Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/web/Dockerfile
          ignore: DL3008,DL3013    # apt pin / pip pin — acceptable for our skeletons
      - name: Lint otp Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: docker/otp/Dockerfile
          ignore: DL3008,DL3013
