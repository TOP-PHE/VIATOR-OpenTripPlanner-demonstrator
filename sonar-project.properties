# SonarCloud configuration for VIATOR.
# Set up the SONAR_TOKEN repo secret before the workflow can publish.

sonar.projectKey=TOP-PHE_VIATOR-a-MERITS-OpenTrip-Planner-demonstrator
sonar.organization=top-phe
sonar.projectName=VIATOR
sonar.projectVersion=0.1.0

# Sources and tests
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12

# Coverage report ingestion
sonar.python.coverage.reportPaths=coverage.xml
# JS coverage joins later when journey-ui/ exists:
# sonar.javascript.lcov.reportPaths=journey-ui/coverage/lcov.info

# Exclusions
sonar.exclusions=\
    docker/otp/**,\
    **/__pycache__/**,\
    **/migrations/versions/**,\
    **/node_modules/**,\
    branding/**

sonar.coverage.exclusions=\
    tests/**,\
    **/migrations/**,\
    **/__init__.py,\
    app/worker.py

# Copy-paste detection: exclude code whose boilerplate legitimately repeats.
#  - tests/**          : the fresh-DB / TestClient / bootstrap-admin fixture
#                        harness is repeated across tests/integration/*.
#  - alembic/versions/*: Alembic migrations share revision-header / import /
#                        upgrade-downgrade boilerplate by construction. (The
#                        sonar.exclusions `**/migrations/versions/**` above
#                        predates this repo's `alembic/versions/` layout and
#                        never matched, so CPD still saw them.)
sonar.cpd.exclusions=\
    tests/**,\
    alembic/versions/**

# ── Coverage exclusions, cont. ──────────────────────────────────────────────
#  - app/worker.py: the background worker is a docker-orchestration shell —
#    it shells out to `docker compose run/stop/start` and `nginx -s reload`,
#    none of which run in CI (no docker-in-docker). Its testable logic lives
#    in pure helpers elsewhere (app/otp_heap.py, parsing helpers) which ARE
#    unit-tested; the orchestration itself is integration-territory. Excluded
#    from coverage so the gate reflects testable code, not docker plumbing.

# ── Issue suppressions ──────────────────────────────────────────────────────
# python:S3776 (cognitive complexity) on app/worker.py::run_build — the
# function coordinates the whole build pipeline (session-config + credential
# resolution, max-memory orchestration, `docker compose run`, graph promotion).
# Its complexity predates the v0.1.38 build-memory changes and a split is
# tracked as follow-up tech debt; we don't risk refactoring critical build
# code in a release whose docker path can't be exercised in CI.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=app/worker.py
