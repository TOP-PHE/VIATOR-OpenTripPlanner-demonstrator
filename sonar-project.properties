# SonarCloud configuration for VIATOR.
# Set up the SONAR_TOKEN repo secret before the workflow can publish.

sonar.projectKey=TOP-PHE_VIATOR-a-MERITS-OpenTrip-Planner-demonstrator
sonar.organization=top-phe
sonar.projectName=VIATOR
sonar.projectVersion=0.1.0

# Sources and tests
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12

# Coverage report ingestion
sonar.python.coverage.reportPaths=coverage.xml
# JS coverage joins later when journey-ui/ exists:
# sonar.javascript.lcov.reportPaths=journey-ui/coverage/lcov.info

# Exclusions
sonar.exclusions=\
    docker/otp/**,\
    **/__pycache__/**,\
    **/migrations/versions/**,\
    **/node_modules/**,\
    branding/**

sonar.coverage.exclusions=\
    tests/**,\
    **/migrations/**,\
    **/__init__.py

# Copy-paste detection: exclude code whose boilerplate legitimately repeats.
#  - tests/**          : the fresh-DB / TestClient / bootstrap-admin fixture
#                        harness is repeated across tests/integration/*.
#  - alembic/versions/*: Alembic migrations share revision-header / import /
#                        upgrade-downgrade boilerplate by construction. (The
#                        sonar.exclusions `**/migrations/versions/**` above
#                        predates this repo's `alembic/versions/` layout and
#                        never matched, so CPD still saw them.)
sonar.cpd.exclusions=\
    tests/**,\
    alembic/versions/**
