# Run on every commit. Install once with `pre-commit install`.
# CI also runs `pre-commit run --all-files` as a belt-and-braces check.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # black removed in audit-2026-05 #21 closure. `ruff format` (the
  # ruff-pre-commit hook above) replaces it — single formatter, no
  # flip-flops between two tools with subtly different rules
  # (specifically the multi-line-string `op.execute("""...""")` pattern
  # in Alembic migrations where black 26 + ruff-format 0.7 disagree).

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.0.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic==2.10.3
          - pydantic-settings==2.6.1
          - sqlalchemy==2.0.49
          - fastapi==0.115.6
          - types-defusedxml==0.7.0.20260504  # stubs for app/journey/ojp_client.py
        args: ["--config-file=pyproject.toml"]
        # mypy is slow; skip on commit, run on push or in CI
        stages: [pre-push]

  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: ["--ignore", "DL3008", "--ignore", "DL3013"]
