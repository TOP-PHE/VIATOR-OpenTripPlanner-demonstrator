worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 4096M;   # OSM PBF / NeTEx ZIPs are large
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    upstream web_upstream { server web:8000; }

    server {
        listen 80;
        server_name _;

        # Admin UI + journey UI + REST API + auth flow.
        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Per-session OTP routing — `location /otp/<sid>/ { proxy_pass http://otp-<sid>:8080/otp/; }`
        # blocks are written by `app/sessions_orchestrator.py` to
        # `./generated/nginx-sessions.conf`, mounted here at
        # `/etc/nginx/conf.d/sessions/nginx-sessions.conf`. The glob below
        # matches zero or more files, so nginx still starts cleanly when no
        # session is in state='serving' yet.
        include /etc/nginx/conf.d/sessions/*.conf;
    }
}
