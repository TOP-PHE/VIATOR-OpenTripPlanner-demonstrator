worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 4096M;   # OSM PBF / NeTEx ZIPs are large
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    upstream web_upstream { server web:8000; }
    upstream otp_upstream { server otp:8080; }

    server {
        listen 80;
        server_name _;

        # Upload UI + ingestion API
        location / {
            proxy_pass http://web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # OTP routing API (GraphQL + actuator)
        location /otp/ {
            proxy_pass http://otp_upstream/otp/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
