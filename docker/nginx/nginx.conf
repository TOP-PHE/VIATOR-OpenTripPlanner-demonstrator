worker_processes auto;
events { worker_connections 1024; }

http {
    sendfile on;
    client_max_body_size 4096M;   # OSM PBF / NeTEx ZIPs are large
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # ─────────────────────── docker DNS resolver (v0.1.15) ───────────────
    # Docker's embedded DNS (always at 127.0.0.11) lets nginx re-resolve
    # service names dynamically. Combined with the variable-based
    # `proxy_pass http://$var` pattern below, this means nginx will pick
    # up a recreated `web` (or `otp-<sid>`) container on its own, without
    # an `nginx -s reload`.
    #
    # Why we needed this: the previous static `upstream { server web:8000; }`
    # block resolved the hostname once at config-load time and cached the
    # IP forever. Each `docker compose up -d web` recreates the container
    # with a new IP → nginx kept proxying to the old (gone) IP → 502 Bad
    # Gateway until somebody manually restarted nginx.
    #
    # `valid=10s` caps the cache TTL so a recreated container is reachable
    # within ~10s. `ipv6=off` because Docker's DNS may return AAAA records
    # the upstream container doesn't bind to.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ─────────────────────────── HTTP → HTTPS redirect ──────────────────────
    # Everything on :80 is redirected to :443. The /.well-known/acme-challenge/
    # path is left available on plain HTTP for Let's Encrypt renewal via the
    # webroot method (see docs in INSTALL.md §11.9).
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────── HTTPS server ───────────────────────────
    # Cert path matches the issuer name passed to `certbot certonly -d ...`.
    # Bumping or replacing the cert: re-issue with the same `-d <hostname>` and
    # the path stays valid. Issuing with a new hostname requires editing this
    # block (or templating it via env, future cleanup).
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name vmi3259514.contaboserver.net;

        ssl_certificate     /etc/nginx/certs/live/vmi3259514.contaboserver.net/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/vmi3259514.contaboserver.net/privkey.pem;

        # Mozilla "intermediate" profile — TLS 1.2 + 1.3 only, no weak ciphers.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Admin UI + journey UI + REST API + auth flow.
        location / {
            # v0.1.15: variable-based upstream so the docker resolver above
            # is consulted at request time instead of cached at startup.
            # `set` is required — `proxy_pass http://web:8000` (literal)
            # would still cache. The variable forces dynamic resolution.
            set $web_upstream "web:8000";
            proxy_pass http://$web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Per-session OTP routing — `location /otp/<sid>/ { ... }` blocks
        # are written by `app/sessions_orchestrator.py` to
        # `./generated/nginx-sessions.conf`, mounted at
        # `/etc/nginx/conf.d/sessions/nginx-sessions.conf`. The glob below
        # matches zero or more files, so nginx still starts cleanly when no
        # session is in state='serving' yet.
        #
        # The generated blocks also use the v0.1.15 variable-based upstream
        # pattern so per-session OTP container restarts don't 502 either.
        include /etc/nginx/conf.d/sessions/*.conf;
    }
}
