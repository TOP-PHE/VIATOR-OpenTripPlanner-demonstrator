name: viator

# Per-session OTP services live in a separate file written by
# `app/sessions_orchestrator.py` whenever a session reaches state='serving'.
# The included file ships as an empty stub (services: {}) so first
# `docker compose up` works on a clean install before any session exists.
include:
  - ./generated/docker-compose.sessions.yml

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # The `generated/` directory is mounted read-only at the location nginx's
      # main config `include`s. Per-session location blocks land there as
      # `nginx-sessions.conf`, picked up automatically.
      - ./generated:/etc/nginx/conf.d/sessions:ro
      # Let's Encrypt cert dir mounted read-only. The `live/<hostname>/` files
      # are symlinks into `archive/<hostname>/`, so we mount the whole tree.
      # Optional: only present if certbot has issued at least one cert. Compose
      # tolerates a missing source path on bind mount only if the parent dir
      # exists; create it with `sudo mkdir -p /etc/letsencrypt` before `up`.
      - /etc/letsencrypt:/etc/nginx/certs:ro
    depends_on:
      web:
        condition: service_healthy   # audit-2026-05 #8: don't proxy until uvicorn is actually ready

  web:
    # Pull from GHCR by default; the `build:` stanza is the fallback for local
    # dev and for VPSes that prefer building over pulling. `VIATOR_VERSION`
    # picks the tag — set to `v0.1.0`, `latest`, etc. via .env.
    image: ghcr.io/top-phe/viator-web:${VIATOR_VERSION:-latest}
    build:
      context: ..               # repo root (so app/ and requirements.txt are visible)
      dockerfile: docker/web/Dockerfile
      args:
        # Bake VIATOR_VERSION into the image (UI header badge + /healthz/version).
        # Defaults to `dev` if .env doesn't set it. Pulled images from GHCR
        # already carry the build-time stamp from CI; this only matters for
        # `docker compose build` on local/VPS hosts.
        VIATOR_VERSION: ${VIATOR_VERSION:-dev}
    restart: unless-stopped
    # Pin DNS resolvers explicitly. Docker's default embedded DNS (127.0.0.11)
    # forwards to the host's /etc/resolv.conf, which on Ubuntu 24.04 points
    # at systemd-resolved (127.0.0.53) — that chain is fragile and breaks
    # silently when systemd-resolved hiccups. The web container needs reliable
    # DNS to httpx-download source URLs (data.gouv.fr, geofabrik.de, etc.).
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      INBOX_DIR: /data/inbox
      GRAPH_DIR: /data/graphs
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-2048}
      # Phase-2 JWT auth — required.
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      # Phase-1 transitional — basic-auth upload UI on `/`. Optional.
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # NOTE: VIATOR_VERSION (UI header badge + /healthz/version) is intentionally
      # NOT overridden here. The image's built-in `ENV VIATOR_VERSION=...` (set
      # at build time from the git tag, see docker/web/Dockerfile) is the source
      # of truth — that's what tells operators which build is *actually running*.
      # Override the .env `VIATOR_VERSION` to pull a different image tag, not
      # to relabel the UI of an image you've already pulled.
    volumes:
      - inbox:/data/inbox
      - graphs:/data/graphs
      # Web container reads (and orchestrator writes) generated fragments here.
      # The host-side `./generated/` directory is the same folder mounted into
      # nginx above and into the worker below.
      - ./generated:/data/generated
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ghcr.io/top-phe/viator-web:${VIATOR_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    # The worker shares the web image but doesn't bind port 8000; the image's
    # HEALTHCHECK (curl /healthz/version) would always fail here. Disable
    # explicitly so `docker ps` doesn't show the worker as "unhealthy" (which
    # would also block any future depends_on:service_healthy on this service).
    # Audit-2026-05 #8.
    healthcheck:
      disable: true
    # The image runs as appuser (UID 1000), but reading /var/run/docker.sock
    # requires membership in the host's `docker` group. The GID is
    # distribution-dependent — see .env.example DOCKER_GID. Without this,
    # `docker compose run otp-build` from inside the worker fails with
    # "permission denied while trying to connect to the Docker daemon socket".
    group_add:
      - "${DOCKER_GID:-999}"
    # Same reasoning as web — see above.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      INBOX_DIR: /data/inbox
      GRAPH_DIR: /data/graphs
      OTP_BUILD_HEAP: ${OTP_BUILD_HEAP:-12g}
      DEBOUNCE_SECONDS: ${DEBOUNCE_SECONDS:-1800}
      JWT_SECRET: ${JWT_SECRET}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - inbox:/data/inbox
      - graphs:/data/graphs
      - ./generated:/data/generated
      # Mount the host docker/ directory (this directory) into the worker so
      # `docker compose -p viator <subcmd>` finds docker-compose.yml + the
      # generated fragment via include. Read-only — the orchestrator writes
      # via /data/generated above; this mount is for *reading* the compose
      # graph during `compose run` and `compose up`.
      - .:/srv/docker:ro
      # Worker spawns the otp-build container via the host docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot OTP graph builder. Never started by `up`; the worker invokes it
  # via `docker compose run` with per-session env overrides:
  #   docker compose -p viator run --rm \
  #     -e OTP_INBOX_DIR=/var/otp/inbox/<sid> \
  #     -e OTP_GRAPH_DIR=/var/otp/graph/<sid> \
  #     otp-build
  otp-build:
    image: ghcr.io/top-phe/viator-otp:${VIATOR_VERSION:-latest}
    build: ./otp
    profiles: ["build-only"]
    # The build-only profile runs OTP in `--build` mode, which doesn't bind
    # port 8080 — the image's HEALTHCHECK would fail on a one-shot container
    # that exits as soon as the graph is written. Disable explicitly so a
    # transient "unhealthy" state doesn't trip parent-task error handling.
    # Audit-2026-05 #8.
    healthcheck:
      disable: true
    # Hard cap so a runaway build OOMKills cleanly instead of slowly swapping
    # the host. Should be `-Xmx` plus ~4 GB of native headroom (Direct
    # buffers, metaspace, threads, GC). Default 12g pairs with the default
    # 8g heap (IDF). For France-wide bump both: heap=24g, limit=28g.
    mem_limit: ${OTP_BUILD_MEM_LIMIT:-12g}
    environment:
      OTP_MODE: build
      OTP_INBOX_DIR: ${OTP_INBOX_DIR:-/var/otp/inbox}
      OTP_GRAPH_DIR: ${OTP_GRAPH_DIR:-/var/otp/graph}
      OTP_HEAP: ${OTP_HEAP:-8g}
      # Build pipeline: 'two_phase' (default — lower peak heap) or 'one_shot'
      # (legacy --build, debug only). See entrypoint.sh.
      OTP_BUILD_PHASES: ${OTP_BUILD_PHASES:-two_phase}
      # OSM filter scope. The worker overrides this per-session when invoking
      # `docker compose run -e OTP_OSM_SCOPE=...` based on
      # `session.config.osm_scope`. The default here is the fallback for
      # sessions that don't have it set. See app/osm_filter.py.
      OTP_OSM_SCOPE: ${OTP_OSM_SCOPE:-transit-focused}
    volumes:
      - inbox:/var/otp/inbox:ro
      - graphs:/var/otp/graph

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inbox:
  graphs:
  pgdata:
