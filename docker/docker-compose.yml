name: viator

# Per-session OTP services live in a separate file written by
# `app/sessions_orchestrator.py` whenever a session reaches state='serving'.
# The included file ships as an empty stub (services: {}) so first
# `docker compose up` works on a clean install before any session exists.
include:
  - ./generated/docker-compose.sessions.yml

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443"   # enable once Let's Encrypt is wired
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # The `generated/` directory is mounted read-only at the location nginx's
      # main config `include`s. Per-session location blocks land there as
      # `nginx-sessions.conf`, picked up automatically.
      - ./generated:/etc/nginx/conf.d/sessions:ro
      # - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - web

  web:
    # Pull from GHCR by default; the `build:` stanza is the fallback for local
    # dev and for VPSes that prefer building over pulling. `VIATOR_VERSION`
    # picks the tag — set to `v0.1.0`, `latest`, etc. via .env.
    image: ghcr.io/top-phe/viator-web:${VIATOR_VERSION:-latest}
    build:
      context: ..               # repo root (so app/ and requirements.txt are visible)
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      INBOX_DIR: /data/inbox
      GRAPH_DIR: /data/graphs
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-2048}
      # Phase-2 JWT auth — required.
      JWT_SECRET: ${JWT_SECRET}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-false}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost}
      # Phase-1 transitional — basic-auth upload UI on `/`. Optional.
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - inbox:/data/inbox
      - graphs:/data/graphs
      # Web container reads (and orchestrator writes) generated fragments here.
      # The host-side `./generated/` directory is the same folder mounted into
      # nginx above and into the worker below.
      - ./generated:/data/generated
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: ghcr.io/top-phe/viator-web:${VIATOR_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    command: ["python", "-m", "app.worker"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      INBOX_DIR: /data/inbox
      GRAPH_DIR: /data/graphs
      OTP_BUILD_HEAP: ${OTP_BUILD_HEAP:-12g}
      DEBOUNCE_SECONDS: ${DEBOUNCE_SECONDS:-1800}
      JWT_SECRET: ${JWT_SECRET}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - inbox:/data/inbox
      - graphs:/data/graphs
      - ./generated:/data/generated
      # Worker spawns the otp-build container via the host docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot OTP graph builder. Never started by `up`; the worker invokes it
  # via `docker compose run` with per-session env overrides:
  #   docker compose -p viator run --rm \
  #     -e OTP_INBOX_DIR=/var/otp/inbox/<sid> \
  #     -e OTP_GRAPH_DIR=/var/otp/graph/<sid> \
  #     otp-build
  otp-build:
    image: ghcr.io/top-phe/viator-otp:${VIATOR_VERSION:-latest}
    build: ./otp
    profiles: ["build-only"]
    environment:
      OTP_MODE: build
      OTP_INBOX_DIR: ${OTP_INBOX_DIR:-/var/otp/inbox}
      OTP_GRAPH_DIR: ${OTP_GRAPH_DIR:-/var/otp/graph}
      OTP_HEAP: ${OTP_HEAP:-12g}
    volumes:
      - inbox:/var/otp/inbox:ro
      - graphs:/var/otp/graph

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  inbox:
  graphs:
  pgdata:
